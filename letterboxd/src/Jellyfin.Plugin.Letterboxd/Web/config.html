<!DOCTYPE html>
<html>
<head>
  <title>Letterboxd</title>
  <style>
    .lb-card {
      max-width: 460px;
      background: #141414;
      border-radius: 12px;
      padding: 28px 32px;
      margin: 24px 0;
      color: #fff;
      font-family: sans-serif;
    }
    .lb-card h2 {
      margin: 0 0 6px;
      font-size: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .lb-desc { color: #888; font-size: 14px; margin: 0 0 20px; }
    .lb-input {
      display: block; width: 100%; box-sizing: border-box;
      padding: 10px 12px; margin-bottom: 8px;
      border-radius: 7px; border: 1px solid #333;
      background: #0e0e0e; color: #fff; font-size: 14px;
    }
    .lb-textarea {
      display: block; width: 100%; box-sizing: border-box;
      padding: 8px 10px; margin: 6px 0;
      border-radius: 7px; border: 1px solid #333;
      background: #0e0e0e; color: #fff; font-size: 12px;
      font-family: monospace; resize: vertical;
    }
    .lb-btn {
      display: inline-block; padding: 10px 22px;
      border-radius: 7px; border: none; font-size: 15px;
      font-weight: 600; cursor: pointer;
    }
    .lb-btn-green  { background: #00C030; color: #fff; width: 100%; }
    .lb-btn-danger { background: #c0392b; color: #fff; width: auto; }
    .lb-error    { color: #f55; font-size: 13px; margin: 8px 0 0; min-height: 18px; }
    .lb-username { color: #00C030; font-weight: 700; }
    .lb-cf-warn  {
      font-size: 13px; color: #f90; margin: 0 0 8px;
      border-top: 1px solid #333; padding-top: 14px;
    }
    #lb-connected, #lb-connect-form { margin-top: 12px; }
    #lb-cookie-zone { display: none; margin-top: 14px; }
  </style>
</head>
<body>

<div id="letterboxdConfigPage" data-role="page" class="page type-interior withSectionTabs">
  <div data-role="content">
    <div class="content-primary">

      <div class="lb-card">
        <h2>
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="50" fill="#00C030"/>
            <text x="50" y="68" text-anchor="middle" font-family="serif" font-size="52"
                  font-weight="bold" fill="white">L</text>
          </svg>
          Letterboxd
        </h2>
        <p class="lb-desc">
          Connecte ton compte Letterboxd pour noter tes films à la fin de chaque visionnage.
        </p>

        <div id="lb-status" style="color:#888;font-size:14px">Vérification…</div>

        <!-- Formulaire de connexion -->
        <div id="lb-connect-form" style="display:none">
          <input class="lb-input" id="lb-username" type="text"     placeholder="Nom d'utilisateur Letterboxd" />
          <input class="lb-input" id="lb-password" type="password" placeholder="Mot de passe" />
          <button class="lb-btn lb-btn-green" id="lb-connect-btn">Se connecter</button>
          <p class="lb-error" id="lb-err"></p>

          <!-- Zone cookie — apparaît seulement si Cloudflare bloque -->
          <div id="lb-cookie-zone">
            <p class="lb-cf-warn">
              ⚠️ Cloudflare bloque la connexion directe.<br>
              <a href="https://letterboxd.com" target="_blank" style="color:#00C030;">Ouvre letterboxd.com</a>
              → <b>F12</b> → Réseau → clique une requête → copie le <b>cookie</b> :
            </p>
            <textarea class="lb-textarea" id="lb-cookie" rows="3"
              placeholder="Colle le cookie ici…"></textarea>
            <button class="lb-btn lb-btn-green" id="lb-cookie-btn" style="margin-top:4px;">
              Valider le cookie
            </button>
          </div>
        </div>

        <!-- Section connecté -->
        <div id="lb-connected" style="display:none">
          <p>Connecté en tant que <span class="lb-username" id="lb-username-display"></span></p>
          <button class="lb-btn lb-btn-danger" id="lb-disconnect-btn">Déconnecter</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
(function () {
  var userId;

  function init() {
    userId = ApiClient.getCurrentUserId();
    if (!userId) { setTimeout(init, 300); return; }
    loadStatus();
  }

  function loadStatus() {
    fetch('/JfLetterboxd/status?userId=' + userId)
      .then(function (r) { return r.json(); })
      .then(function (s) {
        document.getElementById('lb-status').style.display = 'none';
        if (s.connected) {
          document.getElementById('lb-username-display').textContent = s.username || '?';
          document.getElementById('lb-connected').style.display = '';
        } else {
          document.getElementById('lb-connect-form').style.display = '';
        }
      })
      .catch(function () {
        document.getElementById('lb-status').textContent = 'Impossible de joindre le plugin.';
      });
  }

  // ── Login username / password ────────────────────────────────────────────────
  document.getElementById('lb-connect-btn').addEventListener('click', function () {
    var username = document.getElementById('lb-username').value.trim();
    var password = document.getElementById('lb-password').value;
    var err  = document.getElementById('lb-err');
    var btn  = document.getElementById('lb-connect-btn');
    if (!username) { err.textContent = "Nom d'utilisateur requis."; return; }
    err.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Connexion…';
    document.getElementById('lb-cookie-zone').style.display = 'none';

    fetch('/JfLetterboxd/connect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: userId, username: username, password: password }),
    })
      .then(function (r) { return r.json(); })
      .then(function (res) {
        if (res.success) {
          onConnected(res.username || username);
        } else if (res.error === 'CLOUDFLARE_BLOCKED') {
          // Montrer la zone cookie compacte
          document.getElementById('lb-cookie-zone').style.display = '';
          btn.disabled = false;
          btn.textContent = 'Se connecter';
        } else {
          err.textContent = res.error || 'Identifiants incorrects.';
          btn.disabled = false;
          btn.textContent = 'Se connecter';
        }
      })
      .catch(function () {
        err.textContent = 'Erreur réseau.';
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      });
  });

  // ── Fallback cookie ──────────────────────────────────────────────────────────
  document.getElementById('lb-cookie-btn').addEventListener('click', function () {
    var cookie = document.getElementById('lb-cookie').value.trim();
    var err    = document.getElementById('lb-err');
    var btn    = document.getElementById('lb-cookie-btn');
    if (!cookie) { err.textContent = 'Colle le cookie avant de valider.'; return; }
    err.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Vérification…';

    fetch('/JfLetterboxd/connect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: userId, cookieString: cookie }),
    })
      .then(function (r) { return r.json(); })
      .then(function (res) {
        if (res.success) {
          onConnected(res.username || '?');
        } else {
          err.textContent = res.error || 'Cookie invalide ou session expirée.';
          btn.disabled = false;
          btn.textContent = 'Valider le cookie';
        }
      })
      .catch(function () {
        err.textContent = 'Erreur réseau.';
        btn.disabled = false;
        btn.textContent = 'Valider le cookie';
      });
  });

  function onConnected(username) {
    document.getElementById('lb-connect-form').style.display = 'none';
    document.getElementById('lb-username-display').textContent = username;
    document.getElementById('lb-connected').style.display = '';
  }

  // ── Déconnexion ──────────────────────────────────────────────────────────────
  document.getElementById('lb-disconnect-btn').addEventListener('click', function () {
    fetch('/JfLetterboxd/disconnect?userId=' + userId, { method: 'DELETE' })
      .then(function () {
        document.getElementById('lb-connected').style.display = 'none';
        document.getElementById('lb-connect-form').style.display = '';
        document.getElementById('lb-cookie-zone').style.display = 'none';
        document.getElementById('lb-username').value = '';
        document.getElementById('lb-password').value = '';
        document.getElementById('lb-cookie').value = '';
      });
  });

  document.addEventListener('viewshow', init);
  if (document.readyState !== 'loading') init();
})();
</script>
</body>
</html>
