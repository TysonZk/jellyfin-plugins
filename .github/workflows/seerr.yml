name: Jellyseerr — Build & Release

on:
  push:
    tags:
      - 'seerr-v*'
  pull_request:
    paths:
      - 'jellyseerr/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build jellyseerr/src/Jellyfin.Plugin.Seerr/Jellyfin.Plugin.Seerr.csproj -c Release

      - uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.Plugin.Seerr
          path: jellyseerr/src/Jellyfin.Plugin.Seerr/bin/Release/net8.0/Jellyfin.Plugin.Seerr.dll

  release:
    if: startsWith(github.ref, 'refs/tags/seerr-v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Get version
        id: version
        run: echo "value=${GITHUB_REF#refs/tags/seerr-v}" >> $GITHUB_OUTPUT

      - name: Build
        run: dotnet build jellyseerr/src/Jellyfin.Plugin.Seerr/Jellyfin.Plugin.Seerr.csproj -c Release

      - name: Create zip
        run: |
          mkdir -p dist
          cp jellyseerr/src/Jellyfin.Plugin.Seerr/bin/Release/net8.0/Jellyfin.Plugin.Seerr.dll dist/
          cd dist && zip Jellyfin.Plugin.Seerr.zip Jellyfin.Plugin.Seerr.dll

      - name: MD5
        id: checksum
        run: echo "md5=$(md5sum dist/Jellyfin.Plugin.Seerr.zip | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Update manifest.json
        run: |
          python3 - <<'PYEOF'
          import json, os
          from datetime import datetime, timezone

          version   = os.environ['VERSION']
          checksum  = os.environ['CHECKSUM']
          tag       = os.environ['TAG']
          repo      = os.environ['REPO']
          timestamp = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          source_url = f"https://github.com/{repo}/releases/download/{tag}/Jellyfin.Plugin.Seerr.zip"

          with open('manifest.json') as f:
              manifest = json.load(f)

          plugin = next(p for p in manifest if p['guid'] == 'b8f4e2d1-7c34-4a56-8901-2e3456789012')
          plugin['versions'] = [v for v in plugin['versions'] if v['version'] != version]
          plugin['versions'].insert(0, {
              "version":   version,
              "changelog": "See release notes on GitHub.",
              "targetAbi": "10.10.0.0",
              "sourceUrl": source_url,
              "checksum":  checksum,
              "timestamp": timestamp
          })

          with open('manifest.json', 'w', encoding='utf-8') as f:
              json.dump(manifest, f, indent=2, ensure_ascii=False)
              f.write('\n')
          print(f"manifest updated — Jellyseerr v{version}")
          PYEOF
        env:
          VERSION:  ${{ steps.version.outputs.value }}
          CHECKSUM: ${{ steps.checksum.outputs.md5 }}
          TAG:      ${{ github.ref_name }}
          REPO:     ${{ github.repository }}

      - name: Commit manifest
        run: |
          git config user.name  "TysonZk"
          git config user.email "TysonZk@users.noreply.github.com"
          git add manifest.json
          git diff --staged --quiet || git commit -m "chore: manifest Jellyseerr ${{ github.ref_name }}"
          git push origin HEAD:main

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/Jellyfin.Plugin.Seerr.zip
          generate_release_notes: true
